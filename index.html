<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quarter-View Action RPG</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            margin: 0; padding: 0;
            background-color: #111;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #gameCanvas { display: block; }
        
        #ui-layer {
            position: absolute; top: 20px; left: 20px;
            pointer-events: none; color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .bar-box {
            margin-bottom: 10px; background: rgba(0, 0, 0, 0.7);
            padding: 10px; border-radius: 6px; width: 220px;
            border: 1px solid #444;
        }
        .bar-container {
            width: 100%; height: 16px; background: #333;
            border-radius: 8px; overflow: hidden; margin-top: 5px;
        }
        .bar { height: 100%; transition: width 0.1s linear; }
        #hp-bar { background: linear-gradient(90deg, #c0392b, #e74c3c); width: 100%; }
        
        /* 스킬 쿨타임 UI */
        #skill-bar {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); display: flex; gap: 15px;
        }
        .skill-slot {
            width: 60px; height: 60px; background: rgba(0, 0, 0, 0.8);
            border: 2px solid #7f8c8d; border-radius: 8px;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; position: relative; overflow: hidden;
        }
        .skill-slot.ready { border-color: #f1c40f; box-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
        .skill-name { font-size: 0.7rem; color: #ccc; margin-bottom: 2px; }
        .skill-key { font-size: 1.2rem; font-weight: bold; color: white; }
        .cooldown-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 0%;
            background: rgba(0, 0, 0, 0.7); transition: height 0.05s linear;
        }

        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 10;
        }
        #game-over button {
            padding: 12px 30px; font-size: 1.2rem; background: #e67e22;
            color: white; border: none; border-radius: 5px; cursor: pointer;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="bar-box">
            <div>HP : <span id="hp-text">100</span> / 100</div>
            <div class="bar-container"><div id="hp-bar" class="bar"></div></div>
            <div style="margin-top: 8px; font-size: 0.9rem; color: #f39c12;">처치한 몬스터: <span id="kill-text">0</span></div>
        </div>
    </div>

    <div id="skill-bar">
        <div class="skill-slot ready" id="slot-a">
            <div class="skill-name">일반공격</div>
            <div class="skill-key">A</div>
            <div class="cooldown-overlay" id="cd-a"></div>
        </div>
        <div class="skill-slot ready" id="slot-s">
            <div class="skill-name">강타 (Smash)</div>
            <div class="skill-key">S</div>
            <div class="cooldown-overlay" id="cd-s"></div>
        </div>
    </div>

    <div id="game-over">
        <h1 style="color: #e74c3c; font-size: 3.5rem;">YOU DIED</h1>
        <p id="final-stats" style="font-size: 1.5rem; margin-bottom: 30px;"></p>
        <button onclick="restartGame()">다시 도전</button>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// --- [스프라이트 생성기] 외부 파일 없이 실행되도록 임시 스프라이트 시트 생성 ---
// 추후 본인의 .png 이미지로 교체할 때는 이 부분 대신 new Image()를 사용하면 됩니다.
function generateSpriteSheet(color, width, height, frames) {
    const offCanvas = document.createElement('canvas');
    offCanvas.width = width * frames;
    offCanvas.height = height;
    const offCtx = offCanvas.getContext('2d');

    for (let i = 0; i < frames; i++) {
        offCtx.save();
        offCtx.translate(i * width + width / 2, height / 2);
        
        // 프레임이 진행될수록 커지면서 사라지는 검기 이펙트
        const progress = (i + 1) / frames;
        const radius = (width / 2.2) * progress;
        offCtx.beginPath();
        offCtx.arc(0, 0, radius, -Math.PI * 0.4, Math.PI * 0.4);
        offCtx.lineWidth = 15 * (1 - progress + 0.2);
        offCtx.strokeStyle = color;
        offCtx.shadowColor = color;
        offCtx.shadowBlur = 15;
        offCtx.stroke();
        offCtx.restore();
    }
    const img = new Image();
    img.src = offCanvas.toDataURL();
    return img;
}

// 애니메이션 스프라이트 객체 생성
const normalSlashImg = generateSpriteSheet('#3498db', 120, 120, 5); // 일반공격: 파란 검기 (5프레임)
const heavySlashImg = generateSpriteSheet('#e74c3c', 180, 180, 6);  // 강타공격: 붉은 검기 (6프레임)

// 게임 상태 변수
let isGameOver = false;
let kills = 0;
let keys = {};
let camera = { x: 0, y: 0 };
let screenShake = 0;

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

// --- [플레이어 객체] ---
const player = {
    x: 0, y: 0,
    radius: 20,
    speed: 4.5,
    hp: 100, maxHp: 100,
    direction: 0, // 0: Right, PI/2: Down, PI: Left, -PI/2: Up
    
    // 공격 상태
    isAttacking: false,
    attackType: null, // 'normal' or 'heavy'
    animFrame: 0,
    animTimer: 0,
    
    // 쿨타임
    cdNormal: 0, maxCdNormal: 20,  // 약 0.33초
    cdHeavy: 0,  maxCdHeavy: 180,  // 약 3초

    update() {
        // 쿨타임 감소
        if (this.cdNormal > 0) this.cdNormal--;
        if (this.cdHeavy > 0) this.cdHeavy--;

        // 방향키 이동 (공격 중에는 이동 속도 감소)
        let dx = 0, dy = 0;
        if (keys['ArrowUp']) dy -= 1;
        if (keys['ArrowDown']) dy += 1;
        if (keys['ArrowLeft']) dx -= 1;
        if (keys['ArrowRight']) dx += 1;

        if (dx !== 0 || dy !== 0) {
            if (dx !== 0 && dy !== 0) { dx *= 0.7071; dy *= 0.7071; }
            const currentSpeed = this.isAttacking ? this.speed * 0.3 : this.speed;
            this.x += dx * currentSpeed;
            this.y += dy * currentSpeed;
            
            // 이동 방향으로 캐릭터 시선 고정
            if (!this.isAttacking) {
                this.direction = Math.atan2(dy, dx);
            }
        }

        // 공격 입력 처리 (A: 일반공격, S: 강타)
        if (keys['KeyA'] && !this.isAttacking && this.cdNormal <= 0) {
            this.startAttack('normal');
        } else if (keys['KeyS'] && !this.isAttacking && this.cdHeavy <= 0) {
            this.startAttack('heavy');
        }

        // 공격 애니메이션 진행
        if (this.isAttacking) {
            this.animTimer++;
            const maxFrames = this.attackType === 'normal' ? 5 : 6;
            const frameSpeed = this.attackType === 'normal' ? 3 : 4; // 프레임당 유지 시간

            if (this.animTimer >= frameSpeed) {
                this.animTimer = 0;
                this.animFrame++;
                
                // 타격 판정 (애니메이션 중간 프레임에 데미지 적용)
                if (this.animFrame === 2) {
                    this.checkHit();
                }

                if (this.animFrame >= maxFrames) {
                    this.isAttacking = false;
                }
            }
        }

        // UI 업데이트
        document.getElementById('hp-bar').style.width = `${(this.hp / this.maxHp) * 100}%`;
        document.getElementById('hp-text').innerText = Math.ceil(this.hp);
        document.getElementById('kill-text').innerText = kills;

        updateSkillUI('a', this.cdNormal, this.maxCdNormal);
        updateSkillUI('s', this.cdHeavy, this.maxCdHeavy);

        if (this.hp <= 0 && !isGameOver) triggerGameOver();
    },

    startAttack(type) {
        this.isAttacking = true;
        this.attackType = type;
        this.animFrame = 0;
        this.animTimer = 0;

        if (type === 'normal') {
            this.cdNormal = this.maxCdNormal;
        } else {
            this.cdHeavy = this.maxCdHeavy;
            screenShake = 15; // 강타 시 화면 흔들림
        }
    },

    // 공격 범위 내 몬스터 타격 판정
    checkHit() {
        const range = this.attackType === 'normal' ? 70 : 110;
        const damage = this.attackType === 'normal' ? 25 : 70;
        const knockback = this.attackType === 'normal' ? 8 : 25;
        const arc = this.attackType === 'normal' ? Math.PI * 0.6 : Math.PI * 1.0; // 강타는 더 넓은 부채꼴

        monsters.forEach(m => {
            const dist = Math.hypot(m.x - this.x, m.y - this.y);
            if (dist < range + m.radius) {
                const angleToMonster = Math.atan2(m.y - this.y, m.x - this.x);
                let diff = angleToMonster - this.direction;
                // 각도 정규화 (-PI ~ PI)
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;

                if (Math.abs(diff) <= arc / 2) {
                    m.hp -= damage;
                    m.vx = Math.cos(angleToMonster) * knockback;
                    m.vy = Math.sin(angleToMonster) * knockback;
                    m.hitTimer = 10;
                    
                    if (this.attackType === 'heavy') {
                        addSlashEffect(m.x, m.y); // 강타 타격 효과
                    }
                }
            }
        });
    },

    draw() {
        ctx.save();
        ctx.translate(this.x - camera.x, this.y - camera.y);

        // 1. 그림자 (쿼터뷰 입체감을 위한 타원)
        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.beginPath();
        ctx.ellipse(0, 15, 18, 8, 0, 0, Math.PI * 2);
        ctx.fill();

        // 2. 캐릭터 몸통
        ctx.fillStyle = '#2ecc71';
        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#27ae60';
        ctx.stroke();

        // 3. 무기 / 검 (방향에 따라 회전)
        ctx.rotate(this.direction);
        ctx.fillStyle = '#bdc3c7';
        ctx.fillRect(10, -4, 25, 8); // 칼날
        ctx.fillStyle = '#e67e22';
        ctx.fillRect(8, -8, 4, 16);  // 코등이

        // 4. 스프라이트 공격 이펙트 렌더링
        if (this.isAttacking) {
            const img = this.attackType === 'normal' ? normalSlashImg : heavySlashImg;
            const frameWidth = this.attackType === 'normal' ? 120 : 180;
            const frameHeight = frameWidth;
            
            ctx.drawImage(
                img,
                this.animFrame * frameWidth, 0, frameWidth, frameHeight,
                -frameWidth * 0.2, -frameHeight / 2, frameWidth, frameHeight
            );
        }

        ctx.restore();
    }
};

// --- [몬스터 클래스] ---
class Monster {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.radius = 16;
        this.speed = Math.random() * 1.0 + 1.2;
        this.hp = 50; this.maxHp = 50;
        this.vx = 0; this.vy = 0; // 넉백 속도
        this.hitTimer = 0;
    }

    update(index) {
        // 넉백 물리 적용
        this.x += this.vx; this.y += this.vy;
        this.vx *= 0.85; this.vy *= 0.85;
        if (this.hitTimer > 0) this.hitTimer--;

        // 플레이어 추격
        const dist = Math.hypot(player.x - this.x, player.y - this.y);
        if (dist > this.radius + player.radius && this.hitTimer === 0) {
            const angle = Math.atan2(player.y - this.y, player.x - this.x);
            this.x += Math.cos(angle) * this.speed;
            this.y += Math.sin(angle) * this.speed;
        } else if (dist <= this.radius + player.radius) {
            // 플레이어 공격
            player.hp = Math.max(0, player.hp - 0.5);
        }

        // 사망 처리
        if (this.hp <= 0) {
            monsters.splice(index, 1);
            kills++;
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x - camera.x, this.y - camera.y);

        // 그림자
        ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
        ctx.beginPath();
        ctx.ellipse(0, 12, 15, 6, 0, 0, Math.PI * 2);
        ctx.fill();

        // 몬스터 몸통 (피격 시 하얗게 깜빡임)
        ctx.fillStyle = this.hitTimer > 0 ? '#ffffff' : '#e74c3c';
        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.fill();

        // 체력바
        if (this.hp < this.maxHp) {
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(-15, -28, 30, 4);
            ctx.fillStyle = '#2ecc71';
            ctx.fillRect(-15, -28, 30 * (this.hp / this.maxHp), 4);
        }

        ctx.restore();
    }
}

// 추가 타격 이펙트 (강타 적중 시)
let hitEffects = [];
function addSlashEffect(x, y) {
    hitEffects.push({ x, y, radius: 1, alpha: 1.0 });
}

let monsters = [];
function spawnMonster() {
    if (monsters.length < 30 && !isGameOver) {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * 300 + 500;
        monsters.push(new Monster(player.x + Math.cos(angle) * dist, player.y + Math.sin(angle) * dist));
    }
}
setInterval(spawnMonster, 800);

// 쿼터뷰 격자 바닥 렌더링
function drawIsometricGrid() {
    const size = 60;
    const offsetX = -camera.x % size;
    const offsetY = -camera.y % size;
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.04)';
    ctx.lineWidth = 1;

    for (let x = offsetX - size; x < canvas.width + size; x += size) {
        for (let y = offsetY - size; y < canvas.height + size; y += size) {
            ctx.strokeRect(x, y, size, size);
        }
    }
}

function updateSkillUI(type, currentCd, maxCd) {
    const slot = document.getElementById(`slot-${type}`);
    const overlay = document.getElementById(`cd-${type}`);
    const pct = (currentCd / maxCd) * 100;
    overlay.style.height = `${pct}%`;
    
    if (currentCd <= 0) slot.classList.add('ready');
    else slot.classList.remove('ready');
}

function triggerGameOver() {
    isGameOver = true;
    document.getElementById('final-stats').innerText = `처치한 몬스터: ${kills}마리`;
    document.getElementById('game-over').style.display = 'flex';
}

function restartGame() {
    isGameOver = false;
    player.hp = player.maxHp;
    player.x = 0; player.y = 0;
    player.cdNormal = 0; player.cdHeavy = 0;
    kills = 0;
    monsters = [];
    document.getElementById('game-over').style.display = 'none';
}

// --- [메인 애니메이션 루프] ---
function animate() {
    requestAnimationFrame(animate);

    // 카메라 추적
    camera.x += (player.x - canvas.width / 2 - camera.x) * 0.1;
    camera.y += (player.y - canvas.height / 2 - camera.y) * 0.1;

    // 화면 흔들림 효과
    let shakeX = 0, shakeY = 0;
    if (screenShake > 0) {
        shakeX = (Math.random() - 0.5) * screenShake;
        shakeY = (Math.random() - 0.5) * screenShake;
        screenShake *= 0.9;
        if (screenShake < 0.5) screenShake = 0;
    }

    ctx.save();
    ctx.translate(shakeX, shakeY);

    // 배경 지우기
    ctx.fillStyle = '#1e1e24';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawIsometricGrid();

    if (!isGameOver) player.update();

    // ★ 쿼터뷰 깊이 정렬 (Depth Sorting): Y좌표가 작은(위에 있는) 객체를 먼저 그림
    let renderList = [player, ...monsters];
    renderList.sort((a, b) => a.y - b.y);

    // 정렬된 순서대로 렌더링
    renderList.forEach(entity => {
        if (entity === player) {
            if (!isGameOver) player.draw();
        } else {
            entity.update(monsters.indexOf(entity));
            entity.draw();
        }
    });

    // 타격 이펙트 렌더링
    hitEffects.forEach((fx, index) => {
        ctx.save();
        ctx.translate(fx.x - camera.x, fx.y - camera.y);
        ctx.beginPath();
        ctx.arc(0, 0, fx.radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(231, 76, 60, ${fx.alpha})`;
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.restore();

        fx.radius += 3;
        fx.alpha -= 0.1;
        if (fx.alpha <= 0) hitEffects.splice(index, 1);
    });

    ctx.restore();
}

animate();
</script>
</body>
</html>
