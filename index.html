<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quarter-View Action RPG</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            margin: 0; padding: 0;
            background-color: #111;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #gameCanvas { display: block; }
        
        #ui-layer {
            position: absolute; top: 20px; left: 20px;
            pointer-events: none; color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .bar-box {
            margin-bottom: 10px; background: rgba(0, 0, 0, 0.7);
            padding: 10px; border-radius: 6px; width: 220px;
            border: 1px solid #444;
        }
        .bar-container {
            width: 100%; height: 16px; background: #333;
            border-radius: 8px; overflow: hidden; margin-top: 5px;
        }
        .bar { height: 100%; transition: width 0.1s linear; }
        #hp-bar { background: linear-gradient(90deg, #c0392b, #e74c3c); width: 100%; }
        
        /* 스킬 쿨타임 UI */
        #skill-bar {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); display: flex; gap: 15px;
        }
        .skill-slot {
            width: 60px; height: 60px; background: rgba(0, 0, 0, 0.8);
            border: 2px solid #7f8c8d; border-radius: 8px;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; position: relative; overflow: hidden;
        }
        .skill-slot.ready { border-color: #f1c40f; box-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
        .skill-name { font-size: 0.7rem; color: #ccc; margin-bottom: 2px; }
        .skill-key { font-size: 1.2rem; font-weight: bold; color: white; }
        .cooldown-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 0%;
            background: rgba(0, 0, 0, 0.7); transition: height 0.05s linear;
        }

        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 10;
        }
        #game-over button {
            padding: 12px 30px; font-size: 1.2rem; background: #e67e22;
            color: white; border: none; border-radius: 5px; cursor: pointer;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="bar-box">
            <div>HP : <span id="hp-text">100</span> / 100</div>
            <div class="bar-container"><div id="hp-bar" class="bar"></div></div>
            <div style="margin-top: 8px; font-size: 0.9rem; color: #f39c12;">처치한 몬스터: <span id="kill-text">0</span></div>
        </div>
    </div>

    <div id="skill-bar">
        <div class="skill-slot ready" id="slot-a">
            <div class="skill-name">일반공격</div>
            <div class="skill-key">A</div>
            <div class="cooldown-overlay" id="cd-a"></div>
        </div>
        <div class="skill-slot ready" id="slot-s">
            <div class="skill-name">강타 (Smash)</div>
            <div class="skill-key">S</div>
            <div class="cooldown-overlay" id="cd-s"></div>
        </div>
    </div>

    <div id="game-over">
        <h1 style="color: #e74c3c; font-size: 3.5rem;">YOU DIED</h1>
        <p id="final-stats" style="font-size: 1.5rem; margin-bottom: 30px;"></p>
        <button onclick="restartGame()">다시 도전</button>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// =================================================================
// ★ 1. 이미지 로딩 (공격 이펙트 + 512x512 바닥 맵 타일)
// =================================================================
const normalSlashImg = new Image();
normalSlashImg.src = '2d_Sword_fx_01.png'; // 일반 공격 (4x4)

const heavySlashImg = new Image();
heavySlashImg.src = '2d_Sword_fx_02.png';  // 강타 공격 (4x4)

const bgImage = new Image();
bgImage.src = '2d_map_tile_01.png';        // ★ 추가하신 512x512 바닥 이미지
let bgPattern = null;

bgImage.onload = () => {
    // 이미지가 로드되면 캔버스의 무한 반복(repeat) 패턴으로 등록합니다.
    bgPattern = ctx.createPattern(bgImage, 'repeat');
};
// =================================================================

let isGameOver = false;
let kills = 0;
let keys = {};
let camera = { x: 0, y: 0 };
let screenShake = 0;

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

// --- [플레이어 객체] ---
const player = {
    x: 0, y: 0, // 바닥(발) 기준 좌표
    radius: 18,
    speed: 4.5,
    hp: 100, maxHp: 100,
    direction: 0, 
    
    isAttacking: false,
    attackType: null, 
    animFrame: 0,
    animTimer: 0,
    
    cdNormal: 0, maxCdNormal: 25, 
    cdHeavy: 0,  maxCdHeavy: 180, 

    update() {
        if (this.cdNormal > 0) this.cdNormal--;
        if (this.cdHeavy > 0) this.cdHeavy--;

        let dx = 0, dy = 0;
        if (keys['ArrowUp']) dy -= 1;
        if (keys['ArrowDown']) dy += 1;
        if (keys['ArrowLeft']) dx -= 1;
        if (keys['ArrowRight']) dx += 1;

        if (dx !== 0 || dy !== 0) {
            if (dx !== 0 && dy !== 0) { dx *= 0.7071; dy *= 0.7071; }
            const currentSpeed = this.isAttacking ? this.speed * 0.3 : this.speed;
            
            this.x += dx * currentSpeed;
            // 쿼터뷰 원근감 보정: Y축 이동을 조금 더 무겁게 줘서 깊이감 표현
            this.y += dy * currentSpeed * 0.8; 
            
            if (!this.isAttacking) {
                this.direction = Math.atan2(dy, dx);
            }
        }

        if (keys['KeyA'] && !this.isAttacking && this.cdNormal <= 0) {
            this.startAttack('normal');
        } else if (keys['KeyS'] && !this.isAttacking && this.cdHeavy <= 0) {
            this.startAttack('heavy');
        }

        if (this.isAttacking) {
            this.animTimer++;
            const maxFrames = 16; 
            const frameSpeed = this.attackType === 'normal' ? 1 : 2; 

            if (this.animTimer >= frameSpeed) {
                this.animTimer = 0;
                this.animFrame++;
                
                if (this.animFrame === 5) {
                    this.checkHit();
                }

                if (this.animFrame >= maxFrames) {
                    this.isAttacking = false;
                }
            }
        }

        document.getElementById('hp-bar').style.width = `${(this.hp / this.maxHp) * 100}%`;
        document.getElementById('hp-text').innerText = Math.ceil(this.hp);
        document.getElementById('kill-text').innerText = kills;

        updateSkillUI('a', this.cdNormal, this.maxCdNormal);
        updateSkillUI('s', this.cdHeavy, this.maxCdHeavy);

        if (this.hp <= 0 && !isGameOver) triggerGameOver();
    },

    startAttack(type) {
        this.isAttacking = true;
        this.attackType = type;
        this.animFrame = 0;
        this.animTimer = 0;

        if (type === 'normal') {
            this.cdNormal = this.maxCdNormal;
        } else {
            this.cdHeavy = this.maxCdHeavy;
            screenShake = 15; 
        }
    },

    checkHit() {
        const range = this.attackType === 'normal' ? 85 : 130;
        const damage = this.attackType === 'normal' ? 25 : 70;
        const knockback = this.attackType === 'normal' ? 10 : 28;
        const arc = this.attackType === 'normal' ? Math.PI * 0.7 : Math.PI * 1.1;

        monsters.forEach(m => {
            const dist = Math.hypot(m.x - this.x, m.y - this.y);
            if (dist < range + m.radius) {
                const angleToMonster = Math.atan2(m.y - this.y, m.x - this.x);
                let diff = angleToMonster - this.direction;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;

                if (Math.abs(diff) <= arc / 2) {
                    m.hp -= damage;
                    m.vx = Math.cos(angleToMonster) * knockback;
                    m.vy = Math.sin(angleToMonster) * knockback;
                    m.hitTimer = 10;
                    
                    if (this.attackType === 'heavy') {
                        addSlashEffect(m.x, m.y);
                    }
                }
            }
        });
    },

    draw() {
        ctx.save();
        ctx.translate(this.x - camera.x, this.y - camera.y);

        // 바닥 그림자
        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
        ctx.beginPath();
        ctx.ellipse(0, 0, 18, 8, 0, 0, Math.PI * 2);
        ctx.fill();

        // 입체화: 몸통을 바닥보다 위쪽에 그림
        ctx.translate(0, -18);

        ctx.fillStyle = '#2ecc71';
        ctx.beginPath();
        ctx.ellipse(0, 0, 16, 20, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#27ae60';
        ctx.stroke();

        ctx.fillStyle = '#1abc9c';
        ctx.beginPath();
        ctx.arc(0, -8, 10, 0, Math.PI * 2);
        ctx.fill();

        ctx.rotate(this.direction);

        ctx.fillStyle = '#bdc3c7';
        ctx.fillRect(12, -4, 28, 7); 
        ctx.fillStyle = '#e67e22';
        ctx.fillRect(10, -8, 4, 16); 

        // 공격 이펙트 렌더링
        if (this.isAttacking) {
            const img = this.attackType === 'normal' ? normalSlashImg : heavySlashImg;
            
            if (img.complete && img.naturalWidth > 0) {
                const frameWidth = img.width / 4;
                const frameHeight = img.height / 4;
                const col = this.animFrame % 4;          
                const row = Math.floor(this.animFrame / 4); 
                
                const renderWidth = this.attackType === 'normal' ? 150 : 220;
                const renderHeight = renderWidth;
                
                ctx.drawImage(
                    img,
                    col * frameWidth, row * frameHeight, frameWidth, frameHeight,
                    15, -renderHeight * 0.5, 
                    renderWidth, renderHeight
                );
            }
        }

        ctx.restore();
    }
};

// --- [몬스터 클래스] ---
class Monster {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.radius = 16;
        this.speed = Math.random() * 0.8 + 1.0;
        this.hp = 50; this.maxHp = 50;
        this.vx = 0; this.vy = 0; 
        this.hitTimer = 0;
    }

    update(index) {
        this.x += this.vx; this.y += this.vy;
        this.vx *= 0.85; this.vy *= 0.85;
        if (this.hitTimer > 0) this.hitTimer--;

        const dist = Math.hypot(player.x - this.x, player.y - this.y);
        if (dist > this.radius + player.radius && this.hitTimer === 0) {
            const angle = Math.atan2(player.y - this.y, player.x - this.x);
            this.x += Math.cos(angle) * this.speed;
            this.y += Math.sin(angle) * (this.speed * 0.8);
        } else if (dist <= this.radius + player.radius) {
            player.hp = Math.max(0, player.hp - 0.5);
        }

        if (this.hp <= 0) {
            monsters.splice(index, 1);
            kills++;
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x - camera.x, this.y - camera.y);

        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.beginPath();
        ctx.ellipse(0, 0, 16, 7, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.translate(0, -14);

        ctx.fillStyle = this.hitTimer > 0 ? '#ffffff' : '#c0392b';
        ctx.beginPath();
        ctx.ellipse(0, 0, 15, 18, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = this.hitTimer > 0 ? '#ffffff' : '#e74c3c';
        ctx.beginPath();
        ctx.arc(0, -8, 10, 0, Math.PI * 2);
        ctx.fill();

        if (this.hp < this.maxHp) {
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(-15, -28, 30, 5);
            ctx.fillStyle = '#2ecc71';
            ctx.fillRect(-15, -28, 30 * (this.hp / this.maxHp), 5);
        }

        ctx.restore();
    }
}

let hitEffects = [];
function addSlashEffect(x, y) {
    hitEffects.push({ x, y, radius: 1, alpha: 1.0 });
}

let monsters = [];
function spawnMonster() {
    if (monsters.length < 35 && !isGameOver) {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * 300 + 500;
        monsters.push(new Monster(player.x + Math.cos(angle) * dist, player.y + Math.sin(angle) * dist));
    }
}
setInterval(spawnMonster, 800);

// =================================================================
// ★ 2. 평범한 2D 맵 이미지를 쿼터뷰 입체 바닥으로 렌더링하는 함수
// =================================================================
function drawIsometricBackground() {
    // 배경색을 어둡게 깔아줌 (로딩 전이나 모서리 여백 대비)
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 바닥 패턴 로딩이 안 됐거나 실패한 경우 기존 선 격자 그리기(안전장치)
    if (!bgPattern) {
        const size = 80;
        const offsetX = -camera.x % (size * 2);
        const offsetY = -camera.y % size;
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let x = offsetX - size * 5; x < canvas.width + size * 5; x += size) {
            ctx.moveTo(x, 0); ctx.lineTo(x - canvas.height * 2, canvas.height);
            ctx.moveTo(x, 0); ctx.lineTo(x + canvas.height * 2, canvas.height);
        }
        ctx.stroke();
        return;
    }

    ctx.save();
    
    // 1. 화면의 정중앙을 원점(0,0)으로 맞춤
    ctx.translate(canvas.width / 2, canvas.height / 2);
    
    // ★ 2. 쿼터뷰(Isometric) 각도 변환! (세로를 0.5배 누르고 45도 회전)
    ctx.scale(1, 0.5);       
    ctx.rotate(Math.PI / 4); 
    
    // 3. 카메라 좌표에 맞춰 바닥 패턴을 반대로 스크롤시킴 (이동 효과)
    ctx.translate(-camera.x, -camera.y);

    // 4. 화면 회전 및 축소로 인해 빈 공간이 보이지 않도록, 화면보다 훨씬 넓은 영역에 패턴을 칠함
    ctx.fillStyle = bgPattern;
    const drawSize = Math.max(canvas.width, canvas.height) * 4;
    ctx.fillRect(
        camera.x - drawSize, 
        camera.y - drawSize, 
        drawSize * 2, 
        drawSize * 2
    );

    ctx.restore();
}
// =================================================================

function updateSkillUI(type, currentCd, maxCd) {
    const slot = document.getElementById(`slot-${type}`);
    const overlay = document.getElementById(`cd-${type}`);
    const pct = (currentCd / maxCd) * 100;
    overlay.style.height = `${pct}%`;
    
    if (currentCd <= 0) slot.classList.add('ready');
    else slot.classList.remove('ready'); // classList 수정
}

function triggerGameOver() {
    isGameOver = true;
    document.getElementById('final-stats').innerText = `처치한 몬스터: ${kills}마리`;
    document.getElementById('game-over').style.display = 'flex';
}

function restartGame() {
    isGameOver = false;
    player.hp = player.maxHp;
    player.x = 0; player.y = 0;
    player.cdNormal = 0; player.cdHeavy = 0;
    kills = 0;
    monsters = [];
    document.getElementById('game-over').style.display = 'none';
}

// --- [메인 애니메이션 루프] ---
function animate() {
    requestAnimationFrame(animate);

    camera.x += (player.x - canvas.width / 2 - camera.x) * 0.1;
    camera.y += (player.y - canvas.height / 2 - camera.y) * 0.1;

    let shakeX = 0, shakeY = 0;
    if (screenShake > 0) {
        shakeX = (Math.random() - 0.5) * screenShake;
        shakeY = (Math.random() - 0.5) * screenShake;
        screenShake *= 0.9;
        if (screenShake < 0.5) screenShake = 0;
    }

    ctx.save();
    ctx.translate(shakeX, shakeY);

    // ★ 3. 기존 drawIsometricGrid() 대신 새 배경 렌더링 함수 호출!
    drawIsometricBackground();

    if (!isGameOver) player.update();

    // 쿼터뷰 핵심: Y좌표(바닥 발 위치)가 위에 있는 객체부터 그리기 (깊이 정렬)
    let renderList = [player, ...monsters];
    renderList.sort((a, b) => a.y - b.y);

    renderList.forEach(entity => {
        if (entity === player) {
            if (!isGameOver) player.draw();
        } else {
            entity.update(monsters.indexOf(entity));
            entity.draw();
        }
    });

    hitEffects.forEach((fx, index) => {
        ctx.save();
        ctx.translate(fx.x - camera.x, fx.y - camera.y);
        ctx.beginPath();
        ctx.arc(0, -15, fx.radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(231, 76, 60, ${fx.alpha})`;
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.restore();

        fx.radius += 3;
        fx.alpha -= 0.1;
        if (fx.alpha <= 0) hitEffects.splice(index, 1);
    });

    ctx.restore();
}

animate();
</script>
</body>
</html>
