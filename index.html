<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>세상에서 가장 어려운 게임 - 10개 스테이지 완결판</title>
  <style>
    body { background: #222; color: #fff; font-family: 'Malgun Gothic', sans-serif; text-align: center; margin-top: 20px; }
    #game-container { display: inline-block; box-shadow: 0 0 30px rgba(0,0,0,0.8); border: 4px solid #444; background: #bba; }
    canvas { display: block; }
    .ui-panel { background: #111; padding: 10px 20px; font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; border-bottom: 2px solid #444; }
    .death-count { color: #ff4757; }
    .coin-count { color: #ffa502; }
    .level-title { color: #2ed573; }
  </style>
</head>
<body>

  <h2>🛑 세상에서 가장 어려운 게임 (총 10 스테이지)</h2>
  
  <div id="game-container">
    <div class="ui-panel">
      <span class="level-title">LEVEL <span id="level-num">1</span> / 10</span>
      <span class="coin-count">COINS: <span id="coins">0</span> / <span id="total-coins">2</span></span>
      <span class="death-count">TOTAL DEATHS: <span id="deaths">0</span></span>
    </div>
    <canvas id="canvas" width="600" height="400"></canvas>
  </div>
  
  <p style="color: #aaa; margin-top: 15px;">🎮 <b>조작법:</b> 방향키 (↑, ↓, ←, →)로 이동<br>💡 각 스테이지의 노란 코인을 모두 먹고 오른쪽 초록색 안전지대로 가세요!</p>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let totalDeaths = 0;
    let coinsCollected = 0;
    let currentLevelIdx = 0;

    // 키보드 입력 상태 관리
    const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, Up: false, Down: false, Left: false, Right: false };

    // 💡 핵심 버그 해결: 키보드 눌림 상태 강제 초기화 함수
    function resetKeys() {
      for (let k in keys) { keys[k] = false; }
    }

    window.addEventListener('keydown', (e) => { 
      if (keys.hasOwnProperty(e.code) || keys.hasOwnProperty(e.key)) { 
        if (e.code) keys[e.code] = true;
        if (e.key) keys[e.key] = true;
        e.preventDefault(); 
      } 
    });
    
    window.addEventListener('keyup', (e) => { 
      if (keys.hasOwnProperty(e.code) || keys.hasOwnProperty(e.key)) { 
        if (e.code) keys[e.code] = false;
        if (e.key) keys[e.key] = false;
      } 
    });

    const zones = {
      start: { x: 0, y: 100, width: 120, height: 200 },
      end: { x: 480, y: 100, width: 120, height: 200 },
      playArea: { x: 0, y: 100, width: 600, height: 200 }
    };

    const player = {
      x: 50, y: 190, size: 22, speed: 3.5,
      reset() { this.x = 50; this.y = 190; }
    };

    // ==========================================
    // 📂 총 10개의 지옥급 레벨 디자인
    // ==========================================
    const levels = [
      // 1탄: 몸풀기 (속도 2.5 교차)
      {
        coins: [ { x: 250, y: 200, radius: 8 }, { x: 350, y: 200, radius: 8 } ],
        enemies: [
          { type: 'linear', x: 170, y: 120, radius: 10, speedY: 2.5 },
          { type: 'linear', x: 210, y: 280, radius: 10, speedY: -2.5 },
          { type: 'linear', x: 250, y: 120, radius: 10, speedY: 2.5 },
          { type: 'linear', x: 290, y: 280, radius: 10, speedY: -2.5 },
          { type: 'linear', x: 330, y: 120, radius: 10, speedY: 2.5 },
          { type: 'linear', x: 370, y: 280, radius: 10, speedY: -2.5 },
          { type: 'linear', x: 410, y: 120, radius: 10, speedY: 2.5 }
        ]
      },
      // 2탄: 중앙 풍차 회전
      {
        coins: [ { x: 300, y: 130, radius: 8 }, { x: 300, y: 270, radius: 8 } ],
        enemies: [
          { type: 'rotate', centerX: 300, centerY: 200, dist: 40, angle: 0, speed: 0.05, radius: 10 },
          { type: 'rotate', centerX: 300, centerY: 200, dist: 80, angle: 0, speed: 0.05, radius: 10 },
          { type: 'rotate', centerX: 300, centerY: 200, dist: 120, angle: 0, speed: 0.05, radius: 10 },
          { type: 'rotate', centerX: 300, centerY: 200, dist: 40, angle: Math.PI, speed: 0.05, radius: 10 },
          { type: 'rotate', centerX: 300, centerY: 200, dist: 80, angle: Math.PI, speed: 0.05, radius: 10 },
          { type: 'rotate', centerX: 300, centerY: 200, dist: 120, angle: Math.PI, speed: 0.05, radius: 10 }
        ]
      },
      // 3탄: 고속 질주 (속도 4.5)
      {
        coins: [ { x: 200, y: 200, radius: 8 }, { x: 300, y: 200, radius: 8 }, { x: 400, y: 200, radius: 8 } ],
        enemies: [
          { type: 'linear', x: 160, y: 120, radius: 10, speedY: 4.5 },
          { type: 'linear', x: 220, y: 280, radius: 10, speedY: -4.5 },
          { type: 'linear', x: 280, y: 120, radius: 10, speedY: 4.5 },
          { type: 'linear', x: 340, y: 280, radius: 10, speedY: -4.5 },
          { type: 'linear', x: 400, y: 120, radius: 10, speedY: 4.5 },
          { type: 'linear', x: 440, y: 280, radius: 10, speedY: -4.5 }
        ]
      },
      // 4탄: 쌍둥이 풍차 (좌우에서 돌기)
      {
        coins: [ { x: 210, y: 200, radius: 8 }, { x: 390, y: 200, radius: 8 } ],
        enemies: [
          { type: 'rotate', centerX: 210, centerY: 200, dist: 45, angle: 0, speed: 0.06, radius: 10 },
          { type: 'rotate', centerX: 210, centerY: 200, dist: 45, angle: Math.PI, speed: 0.06, radius: 10 },
          { type: 'rotate', centerX: 390, centerY: 200, dist: 45, angle: 0, speed: -0.06, radius: 10 },
          { type: 'rotate', centerX: 390, centerY: 200, dist: 45, angle: Math.PI, speed: -0.06, radius: 10 }
        ]
      },
      // 5탄: 통곡의 벽 ( 2개씩 짝지어 움직이는 밀집 구역)
      {
        coins: [ { x: 300, y: 150, radius: 8 } ],
        enemies: [
          { type: 'linear', x: 180, y: 120, radius: 10, speedY: 3.5 }, { type: 'linear', x: 210, y: 120, radius: 10, speedY: 3.5 },
          { type: 'linear', x: 270, y: 280, radius: 10, speedY: -3.5 }, { type: 'linear', x: 300, y: 280, radius: 10, speedY: -3.5 },
          { type: 'linear', x: 360, y: 120, radius: 10, speedY: 3.5 }, { type: 'linear', x: 390, y: 120, radius: 10, speedY: 3.5 },
          { type: 'linear', x: 450, y: 280, radius: 10, speedY: -3.5 }
        ]
      },
      // 6탄: 태양계 궤도 (속도와 방향이 다른 3중 회전)
      {
        coins: [ { x: 300, y: 120, radius: 8 }, { x: 300, y: 280, radius: 8 } ],
        enemies: [
          { type: 'rotate', centerX: 300, centerY: 200, dist: 35, angle: 0, speed: 0.08, radius: 9 },
          { type: 'rotate', centerX: 300, centerY: 200, dist: 35, angle: Math.PI, speed: 0.08, radius: 9 },
          { type: 'rotate', centerX: 300, centerY: 200, dist: 70, angle: 0, speed: -0.05, radius: 10 },
          { type: 'rotate', centerX: 300, centerY: 200, dist: 70, angle: Math.PI, speed: -0.05, radius: 10 },
          { type: 'rotate', centerX: 300, centerY: 200, dist: 105, angle: 0, speed: 0.03, radius: 11 },
          { type: 'rotate', centerX: 300, centerY: 200, dist: 105, angle: Math.PI, speed: 0.03, radius: 11 }
        ]
      },
      // 7탄: 불규칙 엘리베이터 (속도가 전부 제각각)
      {
        coins: [ { x: 180, y: 200, radius: 8 }, { x: 300, y: 200, radius: 8 }, { x: 420, y: 200, radius: 8 } ],
        enemies: [
          { type: 'linear', x: 150, y: 120, radius: 10, speedY: 2.0 },
          { type: 'linear', x: 190, y: 280, radius: 10, speedY: -4.5 },
          { type: 'linear', x: 230, y: 120, radius: 10, speedY: 3.0 },
          { type: 'linear', x: 270, y: 280, radius: 10, speedY: -5.5 },
          { type: 'linear', x: 310, y: 120, radius: 10, speedY: 1.5 },
          { type: 'linear', x: 350, y: 280, radius: 10, speedY: -4.0 },
          { type: 'linear', x: 390, y: 120, radius: 10, speedY: 6.0 },
          { type: 'linear', x: 430, y: 280, radius: 10, speedY: -2.5 }
        ]
      },
      // 8탄: 혼돈의 믹서기 (중앙에서 서로 반대로 도는 회전 십자가)
      {
        coins: [ { x: 220, y: 200, radius: 8 }, { x: 380, y: 200, radius: 8 } ],
        enemies: [
          { type: 'rotate', centerX: 300, centerY: 200, dist: 50, angle: 0, speed: 0.06, radius: 10 },
          { type: 'rotate', centerX: 300, centerY: 200, dist: 50, angle: Math.PI, speed: 0.06, radius: 10 },
          { type: 'rotate', centerX: 300, centerY: 200, dist: 50, angle: Math.PI/2, speed: -0.06, radius: 10 },
          { type: 'rotate', centerX: 300, centerY: 200, dist: 50, angle: Math.PI*1.5, speed: -0.06, radius: 10 },
          { type: 'rotate', centerX: 300, centerY: 200, dist: 90, angle: 0, speed: -0.04, radius: 10 },
          { type: 'rotate', centerX: 300, centerY: 200, dist: 90, angle: Math.PI, speed: -0.04, radius: 10 }
        ]
      },
      // 9탄: 문지기와 풍차 (입구/출구 직선 탄막 + 중앙 풍차)
      {
        coins: [ { x: 300, y: 200, radius: 8 } ],
        enemies: [
          // 입구 문지기
          { type: 'linear', x: 160, y: 120, radius: 10, speedY: 4.0 },
          { type: 'linear', x: 200, y: 280, radius: 10, speedY: -4.0 },
          // 중앙 풍차
          { type: 'rotate', centerX: 300, centerY: 200, dist: 60, angle: 0, speed: 0.07, radius: 10 },
          { type: 'rotate', centerX: 300, centerY: 200, dist: 60, angle: Math.PI, speed: 0.07, radius: 10 },
          // 출구 문지기
          { type: 'linear', x: 400, y: 120, radius: 10, speedY: 4.0 },
          { type: 'linear', x: 440, y: 280, radius: 10, speedY: -4.0 }
        ]
      },
      // 10탄: 👑 최종 보스 (극도의 피지컬 요구 - 4개의 회전축과 고속 탄막)
      {
        coins: [ { x: 210, y: 150, radius: 8 }, { x: 210, y: 250, radius: 8 }, { x: 390, y: 150, radius: 8 }, { x: 390, y: 250, radius: 8 } ],
        enemies: [
          { type: 'linear', x: 150, y: 120, radius: 10, speedY: 5.0 },
          { type: 'rotate', centerX: 230, centerY: 200, dist: 40, angle: 0, speed: 0.08, radius: 9 },
          { type: 'rotate', centerX: 230, centerY: 200, dist: 40, angle: Math.PI, speed: 0.08, radius: 9 },
          { type: 'linear', x: 300, y: 280, radius: 10, speedY: -6.0 }, // 중앙 초고속 바늘
          { type: 'rotate', centerX: 370, centerY: 200, dist: 40, angle: 0, speed: -0.08, radius: 9 },
          { type: 'rotate', centerX: 370, centerY: 200, dist: 40, angle: Math.PI, speed: -0.08, radius: 9 },
          { type: 'linear', x: 450, y: 120, radius: 10, speedY: 5.0 }
        ]
      }
    ];

    let activeCoins = [];
    let activeEnemies = [];

    function loadLevel(idx) {
      resetKeys(); // 💡 로드 직전 키보드 상태 강제 0으로 초기화

      if (idx >= levels.length) {
        alert("🏆 미쳤습니다!! 대망의 10스테이지를 모두 클리어하셨습니다! (총 사망: " + totalDeaths + "회)");
        currentLevelIdx = 0;
        totalDeaths = 0;
        document.getElementById('deaths').innerText = totalDeaths;
        loadLevel(0);
        return;
      }

      const levelData = JSON.parse(JSON.stringify(levels[idx]));
      activeCoins = levelData.coins.map(c => ({ ...c, collected: false }));
      activeEnemies = levelData.enemies;
      
      coinsCollected = 0;
      player.reset();

      document.getElementById('level-num').innerText = idx + 1;
      document.getElementById('coins').innerText = coinsCollected;
      document.getElementById('total-coins').innerText = activeCoins.length;
    }

    function resetCurrentLevel() {
      resetKeys(); // 💡 죽었을 때도 키보드 눌림 상태 초기화
      coinsCollected = 0;
      document.getElementById('coins').innerText = coinsCollected;
      activeCoins.forEach(c => c.collected = false);
      player.reset();
    }

    function checkCircleBoxCollision(circle, boxX, boxY, boxSize) {
      const closestX = Math.max(boxX, Math.min(circle.x, boxX + boxSize));
      const closestY = Math.max(boxY, Math.min(circle.y, boxY + boxSize));
      const distanceX = circle.x - closestX;
      const distanceY = circle.y - closestY;
      return (distanceX * distanceX) + (distanceY * distanceY) < (circle.radius * circle.radius);
    }

    function update() {
      let nextX = player.x;
      let nextY = player.y;

      if (keys.ArrowLeft || keys.Left) nextX -= player.speed;
      if (keys.ArrowRight || keys.Right) nextX += player.speed;
      if (keys.ArrowUp || keys.Up) nextY -= player.speed;
      if (keys.ArrowDown || keys.Down) nextY += player.speed;

      if (nextX >= zones.playArea.x && nextX + player.size <= zones.playArea.x + zones.playArea.width) player.x = nextX;
      if (nextY >= zones.playArea.y && nextY + player.size <= zones.playArea.y + zones.playArea.height) player.y = nextY;

      activeEnemies.forEach(enemy => {
        if (enemy.type === 'linear') {
          enemy.y += enemy.speedY;
          if (enemy.y - enemy.radius <= zones.playArea.y || enemy.y + enemy.radius >= zones.playArea.y + zones.playArea.height) {
            enemy.speedY *= -1;
          }
        } else if (enemy.type === 'rotate') {
          enemy.angle += enemy.speed;
          enemy.x = enemy.centerX + Math.cos(enemy.angle) * enemy.dist;
          enemy.y = enemy.centerY + Math.sin(enemy.angle) * enemy.dist;
        }

        if (checkCircleBoxCollision(enemy, player.x, player.y, player.size)) {
          totalDeaths++;
          document.getElementById('deaths').innerText = totalDeaths;
          resetCurrentLevel();
        }
      });

      activeCoins.forEach(coin => {
        if (!coin.collected && checkCircleBoxCollision(coin, player.x, player.y, player.size)) {
          coin.collected = true;
          coinsCollected++;
          document.getElementById('coins').innerText = coinsCollected;
        }
      });

      if (coinsCollected === activeCoins.length) {
        if (player.x >= zones.end.x && player.x + player.size <= zones.end.x + zones.end.width) {
          resetKeys(); // 💡 알림창 뜨기 전에 키보드 강제 초기화!
          alert("🎉 LEVEL " + (currentLevelIdx + 1) + " CLEAR!");
          resetKeys(); // 💡 알림창 닫힌 후에도 키보드 강제 초기화!
          currentLevelIdx++;
          loadLevel(currentLevelIdx);
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#e4e4fc";
      ctx.fillRect(zones.playArea.x, zones.playArea.y, zones.playArea.width, zones.playArea.height);

      ctx.fillStyle = "#b5e61d";
      ctx.fillRect(zones.start.x, zones.start.y, zones.start.width, zones.start.height);
      ctx.fillRect(zones.end.x, zones.end.y, zones.end.width, zones.end.height);

      activeCoins.forEach(coin => {
        if (!coin.collected) {
          ctx.beginPath();
          ctx.arc(coin.x, coin.y, coin.radius, 0, Math.PI * 2);
          ctx.fillStyle = "#ffdd59";
          ctx.fill();
          ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.stroke();
        }
      });

      activeEnemies.forEach(enemy => {
        ctx.beginPath();
        ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
        ctx.fillStyle = "#0000ff";
        ctx.fill();
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
      });

      ctx.fillStyle = "#ff0000";
      ctx.fillRect(player.x, player.y, player.size, player.size);
      ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.strokeRect(player.x, player.y, player.size, player.size);
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    loadLevel(0);
    gameLoop();
  </script>
</body>
</html>
