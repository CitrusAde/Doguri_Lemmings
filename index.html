<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>세상에서 가장 어려운 게임 - HTML5 포팅</title>
  <style>
    body { background: #222; color: #fff; font-family: 'Malgun Gothic', sans-serif; text-align: center; margin-top: 20px; }
    #game-container { display: inline-block; box-shadow: 0 0 30px rgba(0,0,0,0.8); border: 4px solid #444; background: #bba; }
    canvas { display: block; }
    .ui-panel { background: #111; padding: 10px 20px; font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; border-bottom: 2px solid #444; }
    .death-count { color: #ff4757; }
    .coin-count { color: #ffa502; }
  </style>
</head>
<body>

  <h2>🛑 세상에서 가장 어려운 게임 (The World's Hardest Game)</h2>
  
  <div id="game-container">
    <div class="ui-panel">
      <span>LEVEL 1</span>
      <span class="coin-count">COINS: <span id="coins">0</span> / 2</span>
      <span class="death-count">DEATHS: <span id="deaths">0</span></span>
    </div>
    <canvas id="canvas" width="600" height="400"></canvas>
  </div>
  
  <p style="color: #aaa; margin-top: 15px;">🎮 <b>조작법:</b> 방향키 (↑, ↓, ←, →)로 이동<br>💡 노란 코인을 모두 먹고 오른쪽 초록색 안전지대로 이동하세요!</p>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let deaths = 0;
    let coinsCollected = 0;
    const totalCoins = 2;

    // 키보드 입력 상태 관리
    const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

    window.addEventListener('keydown', (e) => {
      if (keys.hasOwnProperty(e.code)) {
        keys[e.code] = true;
        e.preventDefault(); // 화면 스크롤 방지
      }
    });

    window.addEventListener('keyup', (e) => {
      if (keys.hasOwnProperty(e.code)) {
        keys[e.code] = false;
      }
    });

    // 영역(존) 정의
    const zones = {
      start: { x: 0, y: 100, width: 120, height: 200 },
      end: { x: 480, y: 100, width: 120, height: 200 },
      playArea: { x: 0, y: 100, width: 600, height: 200 }
    };

    // 플레이어 (빨간 사각형) - 가속도 없이 일정한 속도 유지
    const player = {
      x: 50, y: 190, size: 22, speed: 3.5,
      reset() {
        this.x = 50;
        this.y = 190;
      }
    };

    // 장애물 (파란 원) - 위아래로 교차 이동
    const enemies = [
      { x: 170, y: 120, radius: 10, speedY: 2.5 },
      { x: 210, y: 280, radius: 10, speedY: -2.5 },
      { x: 250, y: 120, radius: 10, speedY: 2.5 },
      { x: 290, y: 280, radius: 10, speedY: -2.5 },
      { x: 330, y: 120, radius: 10, speedY: 2.5 },
      { x: 370, y: 280, radius: 10, speedY: -2.5 },
      { x: 410, y: 120, radius: 10, speedY: 2.5 }
    ];

    // 코인 (노란 원)
    let coins = [
      { x: 250, y: 200, radius: 8, collected: false },
      { x: 330, y: 200, radius: 8, collected: false }
    ];

    function resetCoins() {
      coinsCollected = 0;
      document.getElementById('coins').innerText = coinsCollected;
      coins.forEach(c => c.collected = false);
    }

    // 정교한 [원 vs 사각형] 1픽셀 충돌 판정 알고리즘
    function checkCircleBoxCollision(circle, boxX, boxY, boxSize) {
      // 사각형 안에서 원의 중심과 가장 가까운 X, Y 좌표 찾기
      const closestX = Math.max(boxX, Math.min(circle.x, boxX + boxSize));
      const closestY = Math.max(boxY, Math.min(circle.y, boxY + boxSize));

      // 가장 가까운 점과 원 중심 간의 거리 계산
      const distanceX = circle.x - closestX;
      const distanceY = circle.y - closestY;
      const distanceSquared = (distanceX * distanceX) + (distanceY * distanceY);

      return distanceSquared < (circle.radius * circle.radius);
    }

    function update() {
      // 1. 플레이어 이동 (관성 없는 즉각 이동)
      let nextX = player.x;
      let nextY = player.y;

      if (keys.ArrowLeft) nextX -= player.speed;
      if (keys.Right || keys.ArrowRight) nextX += player.speed;
      if (keys.ArrowUp) nextY -= player.speed;
      if (keys.ArrowDown) nextY += player.speed;

      // 벽 충돌 제어 (플레이 영역 내부로만 이동 제한)
      if (nextX >= zones.playArea.x && nextX + player.size <= zones.playArea.x + zones.playArea.width) {
        player.x = nextX;
      }
      if (nextY >= zones.playArea.y && nextY + player.size <= zones.playArea.y + zones.playArea.height) {
        player.y = nextY;
      }

      // 2. 장애물 이동 및 충돌 판정
      enemies.forEach(enemy => {
        enemy.y += enemy.speedY;
        // 위아래 벽에 닿으면 반사
        if (enemy.y - enemy.radius <= zones.playArea.y || enemy.y + enemy.radius >= zones.playArea.y + zones.playArea.height) {
          enemy.speedY *= -1;
        }

        // 플레이어와 장애물 충돌 시 사망 처리
        if (checkCircleBoxCollision(enemy, player.x, player.y, player.size)) {
          deaths++;
          document.getElementById('deaths').innerText = deaths;
          player.reset();
          resetCoins(); // 죽으면 먹은 코인도 리셋 (원작 룰)
        }
      });

      // 3. 코인 수집 판정
      coins.forEach(coin => {
        if (!coin.collected && checkCircleBoxCollision(coin, player.x, player.y, player.size)) {
          coin.collected = true;
          coinsCollected++;
          document.getElementById('coins').innerText = coinsCollected;
        }
      });

      // 4. 클리어 판정 (모든 코인 수집 후 도착 지점 진입)
      if (coinsCollected === totalCoins) {
        if (player.x >= zones.end.x && player.x + player.size <= zones.end.x + zones.end.width) {
          alert("🎉 LEVEL CLEAR!! 총 사망 횟수: " + deaths + "회");
          deaths = 0;
          document.getElementById('deaths').innerText = deaths;
          player.reset();
          resetCoins();
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 전체 배경 (체크무늬 느낌의 바닥)
      ctx.fillStyle = "#e4e4fc";
      ctx.fillRect(zones.playArea.x, zones.playArea.y, zones.playArea.width, zones.playArea.height);

      // 시작 지점 & 도착 지점 (안전지대 - 연두색)
      ctx.fillStyle = "#b5e61d";
      ctx.fillRect(zones.start.x, zones.start.y, zones.start.width, zones.start.height);
      ctx.fillRect(zones.end.x, zones.end.y, zones.end.width, zones.end.height);

      // 코인 그리기 (노란색 원 + 검정 테두리)
      coins.forEach(coin => {
        if (!coin.collected) {
          ctx.beginPath();
          ctx.arc(coin.x, coin.y, coin.radius, 0, Math.PI * 2);
          ctx.fillStyle = "#ffdd59";
          ctx.fill();
          ctx.strokeStyle = "#000";
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      });

      // 장애물 그리기 (파란색 원 + 하얀 테두리)
      enemies.forEach(enemy => {
        ctx.beginPath();
        ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
        ctx.fillStyle = "#0000ff";
        ctx.fill();
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2;
        ctx.stroke();
      });

      // 플레이어 그리기 (빨간 사각형 + 검정 테두리)
      ctx.fillStyle = "#ff0000";
      ctx.fillRect(player.x, player.y, player.size, player.size);
      ctx.strokeStyle = "#000";
      ctx.lineWidth = 2;
      ctx.strokeRect(player.x, player.y, player.size, player.size);
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // 게임 시작
    gameLoop();
  </script>
</body>
</html>
