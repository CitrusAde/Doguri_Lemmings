<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quarter-View Action RPG (Fixed Camera + D Skill)</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            margin: 0; padding: 0;
            background-color: #111;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #gameCanvas { display: block; }
        
        #ui-layer {
            position: absolute; top: 20px; left: 20px;
            pointer-events: none; color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .bar-box {
            margin-bottom: 10px; background: rgba(0, 0, 0, 0.7);
            padding: 10px; border-radius: 6px; width: 220px;
            border: 1px solid #444;
        }
        .bar-container {
            width: 100%; height: 16px; background: #333;
            border-radius: 8px; overflow: hidden; margin-top: 5px;
        }
        .bar { height: 100%; transition: width 0.1s linear; }
        #hp-bar { background: linear-gradient(90deg, #c0392b, #e74c3c); width: 100%; }
        
        #skill-bar {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); display: flex; gap: 15px;
        }
        .skill-slot {
            width: 60px; height: 60px; background: rgba(0, 0, 0, 0.8);
            border: 2px solid #7f8c8d; border-radius: 8px;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; position: relative; overflow: hidden;
        }
        .skill-slot.ready { border-color: #f1c40f; box-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
        .skill-name { font-size: 0.7rem; color: #ccc; margin-bottom: 2px; }
        .skill-key { font-size: 1.2rem; font-weight: bold; color: white; }
        .cooldown-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 0%;
            background: rgba(0, 0, 0, 0.7); transition: height 0.05s linear;
        }

        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 10;
        }
        #game-over button {
            padding: 12px 30px; font-size: 1.2rem; background: #e67e22;
            color: white; border: none; border-radius: 5px; cursor: pointer;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="bar-box">
            <div>HP : <span id="hp-text">100</span> / 100</div>
            <div class="bar-container"><div id="hp-bar" class="bar"></div></div>
            <div style="margin-top: 8px; font-size: 0.9rem; color: #f39c12;">처치한 몬스터: <span id="kill-text">0</span></div>
        </div>
    </div>

    <!-- ★ D 스킬 UI 추가 -->
    <div id="skill-bar">
        <div class="skill-slot ready" id="slot-a">
            <div class="skill-name">일반공격</div>
            <div class="skill-key">A</div>
            <div class="cooldown-overlay" id="cd-a"></div>
        </div>
        <div class="skill-slot ready" id="slot-s">
            <div class="skill-name">강타 (Smash)</div>
            <div class="skill-key">S</div>
            <div class="cooldown-overlay" id="cd-s"></div>
        </div>
        <div class="skill-slot ready" id="slot-d">
            <div class="skill-name">특수격 (Special)</div>
            <div class="skill-key">D</div>
            <div class="cooldown-overlay" id="cd-d"></div>
        </div>
    </div>

    <div id="game-over">
        <h1 style="color: #e74c3c; font-size: 3.5rem;">YOU DIED</h1>
        <p id="final-stats" style="font-size: 1.5rem; margin-bottom: 30px;"></p>
        <button onclick="restartGame()">다시 도전</button>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// =================================================================
// 1. 이미지 로딩 (★ 2d_Sword_fx_03.png 추가)
// =================================================================
const normalSlashImg = new Image();
normalSlashImg.src = '2d_Sword_fx_01.png'; // A 스킬 (일반 4x4)

const heavySlashImg = new Image();
heavySlashImg.src = '2d_Sword_fx_02.png';  // S 스킬 (강타 4x4)

const specialSlashImg = new Image();
specialSlashImg.src = '2d_Sword_fx_03.png';// ★ D 스킬 (특수격 4x4)

const bgImage = new Image();
bgImage.src = '2d_map_tile_01.png';        
let bgPattern = null;

bgImage.onload = () => {
    bgPattern = ctx.createPattern(bgImage, 'repeat');
};
// =================================================================

let isGameOver = false;
let kills = 0;
let keys = {};
let camera = { x: 0, y: 0 };
let screenShake = 0;

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

// --- [플레이어 객체] ---
const player = {
    x: 0, y: 0, 
    radius: 18,
    speed: 5.0,
    hp: 100, maxHp: 100,
    direction: 0, 
    
    isAttacking: false,
    attackType: null, // 'normal', 'heavy', 'special'
    animFrame: 0,
    animTimer: 0,
    
    // ★ 쿨타임 관리
    cdNormal: 0,  maxCdNormal: 25,   // 약 0.4초
    cdHeavy: 0,   maxCdHeavy: 180,   // 약 3초
    cdSpecial: 0, maxCdSpecial: 90,  // ★ 약 1.5초

    update() {
        if (this.cdNormal > 0) this.cdNormal--;
        if (this.cdHeavy > 0) this.cdHeavy--;
        if (this.cdSpecial > 0) this.cdSpecial--; // ★ D 스킬 쿨타임 감소

        let dx = 0, dy = 0;
        if (keys['ArrowUp']) dy -= 1;
        if (keys['ArrowDown']) dy += 1;
        if (keys['ArrowLeft']) dx -= 1;
        if (keys['ArrowRight']) dx += 1;

        if (dx !== 0 || dy !== 0) {
            if (dx !== 0 && dy !== 0) { dx *= 0.7071; dy *= 0.7071; }
            const currentSpeed = this.isAttacking ? this.speed * 0.3 : this.speed;
            
            this.x += dx * currentSpeed;
            this.y += dy * currentSpeed * 0.5; 
            
            if (!this.isAttacking) {
                this.direction = Math.atan2(dy, dx);
            }
        }

        // ★ 공격 입력 처리 (A: 일반, S: 강타, D: 특수격)
        if (keys['KeyA'] && !this.isAttacking && this.cdNormal <= 0) {
            this.startAttack('normal');
        } else if (keys['KeyS'] && !this.isAttacking && this.cdHeavy <= 0) {
            this.startAttack('heavy');
        } else if (keys['KeyD'] && !this.isAttacking && this.cdSpecial <= 0) {
            this.startAttack('special'); // ★ D키 입력
        }

        if (this.isAttacking) {
            this.animTimer++;
            const maxFrames = 16; 
            // ★ D 스킬(special)은 화려하게 살짝 빠른 1틱 속도로 재생
            const frameSpeed = this.attackType === 'heavy' ? 2 : 1; 

            if (this.animTimer >= frameSpeed) {
                this.animTimer = 0;
                this.animFrame++;
                if (this.animFrame === 5) this.checkHit();
                if (this.animFrame >= maxFrames) this.isAttacking = false;
            }
        }

        document.getElementById('hp-bar').style.width = `${(this.hp / this.maxHp) * 100}%`;
        document.getElementById('hp-text').innerText = Math.ceil(this.hp);
        document.getElementById('kill-text').innerText = kills;

        updateSkillUI('a', this.cdNormal, this.maxCdNormal);
        updateSkillUI('s', this.cdHeavy, this.maxCdHeavy);
        updateSkillUI('d', this.cdSpecial, this.maxCdSpecial); // ★ D 스킬 UI 업데이트

        if (this.hp <= 0 && !isGameOver) triggerGameOver();
    },

    startAttack(type) {
        this.isAttacking = true;
        this.attackType = type;
        this.animFrame = 0;
        this.animTimer = 0;

        if (type === 'normal') {
            this.cdNormal = this.maxCdNormal;
        } else if (type === 'heavy') {
            this.cdHeavy = this.maxCdHeavy;
            screenShake = 15; 
        } else if (type === 'special') {
            // ★ D 스킬 효과
            this.cdSpecial = this.maxCdSpecial;
            screenShake = 8; // 중간 정도의 흔들림
        }
    },

    checkHit() {
        let range, damage, knockback, arc;
        
        // ★ 각 스킬별 타격 범위, 데미지, 넉백, 공격 각도(부채꼴) 설정
        if (this.attackType === 'normal') {
            range = 85; damage = 25; knockback = 10; arc = Math.PI * 0.7;
        } else if (this.attackType === 'heavy') {
            range = 130; damage = 70; knockback = 28; arc = Math.PI * 1.1;
        } else if (this.attackType === 'special') {
            // ★ D 스킬: 사거리가 넓고 빠른 연격 느낌의 특수 공격
            range = 110; damage = 45; knockback = 18; arc = Math.PI * 0.9;
        }

        monsters.forEach(m => {
            const dist = Math.hypot(m.x - this.x, m.y - this.y);
            if (dist < range + m.radius) {
                const angleToMonster = Math.atan2(m.y - this.y, m.x - this.x);
                let diff = angleToMonster - this.direction;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;

                if (Math.abs(diff) <= arc / 2) {
                    m.hp -= damage;
                    m.vx = Math.cos(angleToMonster) * knockback;
                    m.vy = Math.sin(angleToMonster) * (knockback * 0.5);
                    m.hitTimer = 10;
                    
                    if (this.attackType === 'heavy' || this.attackType === 'special') {
                        addSlashEffect(m.x, m.y);
                    }
                }
            }
        });
    },

    draw() {
        ctx.save();
        ctx.translate(this.x - camera.x, this.y - camera.y);

        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
        ctx.beginPath();
        ctx.ellipse(0, 0, 16, 8, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.translate(0, -20);

        ctx.fillStyle = '#2ecc71';
        ctx.beginPath();
        ctx.ellipse(0, 0, 14, 18, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#27ae60';
        ctx.stroke();

        ctx.fillStyle = '#1abc9c';
        ctx.beginPath();
        ctx.arc(0, -10, 10, 0, Math.PI * 2);
        ctx.fill();

        ctx.rotate(this.direction);

        ctx.fillStyle = '#bdc3c7';
        ctx.fillRect(10, -3, 26, 6); 
        ctx.fillStyle = '#e67e22';
        ctx.fillRect(8, -7, 4, 14); 

        // ★ 이펙트 출력 부분
        if (this.isAttacking) {
            let img;
            let renderWidth = 150;

            // ★ 스킬별로 이미지 및 크기 설정
            if (this.attackType === 'normal') {
                img = normalSlashImg;
                renderWidth = 150;
            } else if (this.attackType === 'heavy') {
                img = heavySlashImg;
                renderWidth = 220;
            } else if (this.attackType === 'special') {
                img = specialSlashImg; // ★ D 스킬 이미지 연결
                renderWidth = 190;     // 중간 정도의 적절한 스케일
            }

            if (img && img.complete && img.naturalWidth > 0) {
                const frameWidth = img.width / 4;
                const frameHeight = img.height / 4;
                const col = this.animFrame % 4;          
                const row = Math.floor(this.animFrame / 4); 
                
                const renderHeight = renderWidth;
                
                ctx.drawImage(
                    img,
                    col * frameWidth, row * frameHeight, frameWidth, frameHeight,
                    -renderWidth * 0.5, -renderHeight * 0.5, 
                    renderWidth, renderHeight
                );
            }
        }
        ctx.restore();
    }
};

// --- [몬스터 클래스] ---
class Monster {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.radius = 16;
        this.speed = Math.random() * 0.8 + 1.0;
        this.hp = 50; this.maxHp = 50;
        this.vx = 0; this.vy = 0; 
        this.hitTimer = 0;
    }

    update(index) {
        this.x += this.vx; this.y += this.vy;
        this.vx *= 0.85; this.vy *= 0.85;
        if (this.hitTimer > 0) this.hitTimer--;

        const dist = Math.hypot(player.x - this.x, player.y - this.y);
        if (dist > this.radius + player.radius && this.hitTimer === 0) {
            const angle = Math.atan2(player.y - this.y, player.x - this.x);
            this.x += Math.cos(angle) * this.speed;
            this.y += Math.sin(angle) * (this.speed * 0.5); 
        } else if (dist <= this.radius + player.radius) {
            player.hp = Math.max(0, player.hp - 0.5);
        }

        if (this.hp <= 0) {
            monsters.splice(index, 1);
            kills++;
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x - camera.x, this.y - camera.y);

        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.beginPath();
        ctx.ellipse(0, 0, 14, 7, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.translate(0, -16);

        ctx.fillStyle = this.hitTimer > 0 ? '#ffffff' : '#c0392b';
        ctx.beginPath();
        ctx.ellipse(0, 0, 13, 16, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = this.hitTimer > 0 ? '#ffffff' : '#e74c3c';
        ctx.beginPath();
        ctx.arc(0, -8, 9, 0, Math.PI * 2);
        ctx.fill();

        if (this.hp < this.maxHp) {
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(-15, -25, 30, 5);
            ctx.fillStyle = '#2ecc71';
            ctx.fillRect(-15, -25, 30 * (this.hp / this.maxHp), 5);
        }
        ctx.restore();
    }
}

let hitEffects = [];
function addSlashEffect(x, y) {
    hitEffects.push({ x, y, radius: 1, alpha: 1.0 });
}

let monsters = [];
function spawnMonster() {
    if (monsters.length < 35 && !isGameOver) {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * 300 + 500;
        monsters.push(new Monster(player.x + Math.cos(angle) * dist, player.y + Math.sin(angle) * (dist * 0.5)));
    }
}
setInterval(spawnMonster, 800);

function drawIsometricBackground() {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (!bgPattern) return;

    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2);
    
    ctx.scale(1, 0.5);       
    ctx.rotate(Math.PI / 4); 
    
    const cos = Math.cos(-Math.PI / 4);
    const sin = Math.sin(-Math.PI / 4);
    const isoCamX = (camera.x * cos - (camera.y * 2) * sin);
    const isoCamY = (camera.x * sin + (camera.y * 2) * cos);

    ctx.translate(-isoCamX, -isoCamY);

    ctx.fillStyle = bgPattern;
    const drawSize = Math.max(canvas.width, canvas.height) * 3;
    ctx.fillRect(
        isoCamX - drawSize, 
        isoCamY - drawSize, 
        drawSize * 2, 
        drawSize * 2
    );

    ctx.restore();
}

function updateSkillUI(type, currentCd, maxCd) {
    const slot = document.getElementById(`slot-${type}`);
    const overlay = document.getElementById(`cd-${type}`);
    if (!slot || !overlay) return;

    const pct = (currentCd / maxCd) * 100;
    overlay.style.height = `${pct}%`;
    
    if (currentCd <= 0) slot.classList.add('ready');
    else slot.classList.remove('ready'); 
}

function triggerGameOver() {
    isGameOver = true;
    document.getElementById('final-stats').innerText = `처치한 몬스터: ${kills}마리`;
    document.getElementById('game-over').style.display = 'flex';
}

function restartGame() {
    isGameOver = false;
    player.hp = player.maxHp;
    player.x = 0; player.y = 0;
    player.cdNormal = 0; player.cdHeavy = 0; player.cdSpecial = 0;
    kills = 0;
    monsters = [];
    document.getElementById('game-over').style.display = 'none';
}

// --- [메인 애니메이션 루프] ---
function animate() {
    requestAnimationFrame(animate);

    camera.x += (player.x - camera.x) * 0.1;
    camera.y += (player.y - camera.y) * 0.1;

    let shakeX = 0, shakeY = 0;
    if (screenShake > 0) {
        shakeX = (Math.random() - 0.5) * screenShake;
        shakeY = (Math.random() - 0.5) * screenShake;
        screenShake *= 0.9;
        if (screenShake < 0.5) screenShake = 0;
    }

    ctx.save();
    ctx.translate(shakeX, shakeY);

    drawIsometricBackground();

    if (!isGameOver) player.update();

    let renderList = [player, ...monsters];
    renderList.sort((a, b) => a.y - b.y);

    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2);

    renderList.forEach(entity => {
        if (entity === player) {
            if (!isGameOver) player.draw();
        } else {
            entity.update(monsters.indexOf(entity));
            entity.draw();
        }
    });

    hitEffects.forEach((fx, index) => {
        ctx.save();
        ctx.translate(fx.x - camera.x, fx.y - camera.y);
        ctx.beginPath();
        ctx.arc(0, -15, fx.radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(231, 76, 60, ${fx.alpha})`;
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.restore();

        fx.radius += 3;
        fx.alpha -= 0.1;
        if (fx.alpha <= 0) hitEffects.splice(index, 1);
    });

    ctx.restore();
    ctx.restore();
}

animate();
</script>
</body>
</html>
