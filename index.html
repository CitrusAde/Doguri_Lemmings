<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Zomboid Prototype</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #gameCanvas {
            display: block;
            cursor: crosshair;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .stat-box {
            margin-bottom: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 5px;
            border-left: 4px solid #fff;
        }
        .bar-container {
            width: 200px;
            height: 16px;
            background-color: rgba(255,255,255,0.2);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 5px;
        }
        .bar {
            height: 100%;
            transition: width 0.1s linear;
        }
        #hp-bar { background-color: #e74c3c; width: 100%; }
        #stm-bar { background-color: #2ecc71; width: 100%; }
        #ammo-text { font-size: 1.2rem; font-weight: bold; color: #f1c40f; }
        #kill-text { font-size: 1.1rem; color: #ecf0f1; margin-top: 5px; }
        
        #game-over {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
        }
        #game-over h1 { font-size: 4rem; color: #e74c3c; margin: 0 0 20px 0; }
        #game-over button {
            padding: 12px 30px;
            font-size: 1.2rem;
            background: #c0392b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #game-over button:hover { background: #e74c3c; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="stat-box" style="border-color: #e74c3c;">
            <div>HEALTH</div>
            <div class="bar-container"><div id="hp-bar" class="bar"></div></div>
        </div>
        <div class="stat-box" style="border-color: #2ecc71;">
            <div>STAMINA</div>
            <div class="bar-container"><div id="stm-bar" class="bar"></div></div>
        </div>
        <div class="stat-box" style="border-color: #f1c40f;">
            <div>AMMO: <span id="ammo-text">15</span> / ∞</div>
            <div id="kill-text">KILLS: 0</div>
        </div>
    </div>

    <div id="game-over">
        <h1>YOU DIED</h1>
        <p id="final-stats" style="font-size: 1.5rem; margin-bottom: 30px;"></p>
        <button onclick="restartGame()">다시 생존하기</button>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// UI 엘리먼트
const hpBar = document.getElementById('hp-bar');
const stmBar = document.getElementById('stm-bar');
const ammoText = document.getElementById('ammo-text');
const killText = document.getElementById('kill-text');
const gameOverScreen = document.getElementById('game-over');
const finalStats = document.getElementById('final-stats');

// 캔버스 크기 조정
function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// 게임 상태 변수
let isGameOver = false;
let kills = 0;
let keys = {};
let mouse = { x: 0, y: 0 };
let camera = { x: 0, y: 0 };

// 키보드 & 마우스 이벤트
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});
window.addEventListener('mousedown', e => {
    if (e.button === 0 && !isGameOver) player.shoot();
});

// 플레이어 객체
const player = {
    x: 0,
    y: 0,
    radius: 18,
    angle: 0,
    speed: 3,
    runSpeed: 5.5,
    maxHp: 100,
    hp: 100,
    maxStamina: 100,
    stamina: 100,
    ammo: 15,
    
    update() {
        // 달리기 및 스태미나 관리
        let currentSpeed = this.speed;
        if ((keys['ShiftLeft'] || keys['ShiftRight']) && this.stamina > 0 && (keys['KeyW'] || keys['KeyA'] || keys['KeyS'] || keys['KeyD'])) {
            currentSpeed = this.runSpeed;
            this.stamina = Math.max(0, this.stamina - 0.6);
        } else {
            this.stamina = Math.min(this.maxStamina, this.stamina + 0.3);
        }

        // 이동 (WASD)
        let dx = 0;
        let dy = 0;
        if (keys['KeyW']) dy -= 1;
        if (keys['KeyS']) dy += 1;
        if (keys['KeyA']) dx -= 1;
        if (keys['KeyD']) dx += 1;

        // 대각선 이동 속도 보정
        if (dx !== 0 && dy !== 0) {
            dx *= 0.7071;
            dy *= 0.7071;
        }

        this.x += dx * currentSpeed;
        this.y += dy * currentSpeed;

        // 마우스 방향 조준
        const screenX = this.x - camera.x;
        const screenY = this.y - camera.y;
        this.angle = Math.atan2(mouse.y - screenY, mouse.x - screenX);

        // UI 업데이트
        hpBar.style.width = `${(this.hp / this.maxHp) * 100}%`;
        stmBar.style.width = `${(this.stamina / this.maxStamina) * 100}%`;
        ammoText.innerText = this.ammo;
        killText.innerText = `KILLS: ${kills}`;

        // 사망 처리
        if (this.hp <= 0 && !isGameOver) {
            triggerGameOver();
        }
    },

    shoot() {
        if (this.ammo > 0) {
            this.ammo--;
            const tipX = this.x + Math.cos(this.angle) * 25;
            const tipY = this.y + Math.sin(this.angle) * 25;
            bullets.push(new Bullet(tipX, tipY, this.angle));
            
            // 총소리 소음으로 인한 주변 좀비 어그로 (간단한 파문 효과)
            zombies.forEach(z => {
                const dist = Math.hypot(this.x - z.x, this.y - z.y);
                if (dist < 500) z.alerted = true;
            });
        }
    },

    draw() {
        ctx.save();
        ctx.translate(this.x - camera.x, this.y - camera.y);
        ctx.rotate(this.angle);

        // 손전등 / 시야 효과 (조준 방향으로 밝은 빛)
        let gradient = ctx.createRadialGradient(0, 0, 10, 0, 0, 300);
        gradient.addColorStop(0, 'rgba(255, 255, 200, 0.15)');
        gradient.addColorStop(1, 'rgba(255, 255, 200, 0)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, 300, -0.6, 0.6);
        ctx.closePath();
        ctx.fill();

        // 플레이어 몸통
        ctx.fillStyle = '#3498db';
        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.fill();

        // 플레이어 손/총
        ctx.fillStyle = '#f39c12';
        ctx.fillRect(10, -6, 20, 12);
        ctx.fillStyle = '#2c3e50';
        ctx.fillRect(20, -3, 15, 6);

        ctx.restore();
    }
};

// 총알 클래스
class Bullet {
    constructor(x, y, angle) {
        this.x = x;
        this.y = y;
        this.vx = Math.cos(angle) * 16;
        this.vy = Math.sin(angle) * 16;
        this.radius = 3;
        this.distanceTraveled = 0;
        this.maxRange = 600;
    }

    update(index) {
        this.x += this.vx;
        this.y += this.vy;
        this.distanceTraveled += 16;

        if (this.distanceTraveled > this.maxRange) {
            bullets.splice(index, 1);
        }
    }

    draw() {
        ctx.fillStyle = '#f1c40f';
        ctx.beginPath();
        ctx.arc(this.x - camera.x, this.y - camera.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
    }
}

// 좀비 클래스
class Zombie {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = 16;
        this.speed = Math.random() * 1.2 + 1.0; // 개체별 랜덤 이동속도
        this.hp = 30;
        this.angle = 0;
        this.alerted = false;
        this.attackCooldown = 0;
    }

    update(index) {
        const distToPlayer = Math.hypot(player.x - this.x, player.y - this.y);

        // 일정 거리 이내거나 소음에 어그로가 끌리면 플레이어 추격
        if (distToPlayer < 350 || this.alerted) {
            this.alerted = true;
            this.angle = Math.atan2(player.y - this.y, player.x - this.x);
            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed;
        }

        // 플레이어 공격 (접촉 시)
        if (distToPlayer < this.radius + player.radius) {
            if (this.attackCooldown <= 0) {
                player.hp = Math.max(0, player.hp - 15);
                this.attackCooldown = 60; // 1초 쿨타임 (60프레임 기준)
                addBlood(player.x, player.y, 5);
            }
        }

        if (this.attackCooldown > 0) this.attackCooldown--;

        // 총알 충돌 판정
        bullets.forEach((bullet, bIndex) => {
            const dist = Math.hypot(bullet.x - this.x, bullet.y - this.y);
            if (dist < this.radius + bullet.radius) {
                this.hp -= 15;
                this.alerted = true;
                addBlood(this.x, this.y, 8);
                bullets.splice(bIndex, 1);

                // 좀비 사망
                if (this.hp <= 0) {
                    addBlood(this.x, this.y, 25); // 사망 시 큰 피 흔적
                    
                    // 30% 확률로 아이템 드롭
                    if (Math.random() < 0.3) {
                        items.push(new Item(this.x, this.y, Math.random() < 0.5 ? 'medkit' : 'ammo'));
                    }
                    
                    zombies.splice(index, 1);
                    kills++;
                }
            }
        });
    }

    draw() {
        ctx.save();
        ctx.translate(this.x - camera.x, this.y - camera.y);
        ctx.rotate(this.angle);

        // 좀비 몸통 (녹색 계열)
        ctx.fillStyle = '#27ae60';
        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.fill();

        // 좀비 팔 (앞으로 뻗은 모습)
        ctx.fillStyle = '#1e8449';
        ctx.fillRect(5, -14, 15, 6);
        ctx.fillRect(5, 8, 15, 6);

        ctx.restore();
    }
}

// 아이템 클래스 (파밍 요소)
class Item {
    constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.type = type; // 'medkit' 또는 'ammo'
        this.radius = 12;
    }

    update(index) {
        const dist = Math.hypot(player.x - this.x, player.y - this.y);
        if (dist < player.radius + this.radius) {
            if (this.type === 'medkit') {
                player.hp = Math.min(player.maxHp, player.hp + 30);
            } else if (this.type === 'ammo') {
                player.ammo += 12;
            }
            items.splice(index, 1);
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x - camera.x, this.y - camera.y);
        
        if (this.type === 'medkit') {
            ctx.fillStyle = '#2ecc71';
            ctx.fillRect(-8, -8, 16, 16);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(-2, -6, 4, 12);
            ctx.fillRect(-6, -2, 12, 4);
        } else {
            ctx.fillStyle = '#f1c40f';
            ctx.beginPath();
            ctx.arc(0, 0, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#d4ac0d';
            ctx.fillRect(-4, -4, 8, 8);
        }
        
        ctx.restore();
    }
}

// 혈흔 효과 (바닥에 영구적으로 남음 - 좀보이드 느낌)
const bloodStains = [];
function addBlood(x, y, count) {
    for (let i = 0; i < count; i++) {
        bloodStains.push({
            x: x + (Math.random() - 0.5) * 30,
            y: y + (Math.random() - 0.5) * 30,
            radius: Math.random() * 4 + 2,
            alpha: Math.random() * 0.5 + 0.3
        });
    }
    // 혈흔이 너무 많아지면 오래된 것부터 삭제 (최적화)
    if (bloodStains.length > 500) bloodStains.splice(0, count);
}

// 게임 엔티티 배열
let bullets = [];
let zombies = [];
let items = [];

// 좀비 스폰 시스템 (플레이어 주변 화면 밖에서 생성)
function spawnZombie() {
    if (zombies.length < 35 && !isGameOver) {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * 300 + 600; // 화면 밖 거리
        const x = player.x + Math.cos(angle) * dist;
        const y = player.y + Math.sin(angle) * dist;
        zombies.push(new Zombie(x, y));
    }
}
setInterval(spawnZombie, 1000);

// 배경 그리드 (아스팔트/바닥 느낌)
function drawGrid() {
    const gridSize = 50;
    const offsetX = -camera.x % gridSize;
    const offsetY = -camera.y % gridSize;

    ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
    ctx.lineWidth = 1;

    for (let x = offsetX; x < canvas.width; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
    }
    for (let y = offsetY; y < canvas.height; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }
}

// 게임 오버 처리
function triggerGameOver() {
    isGameOver = true;
    finalStats.innerText = `생존 중 처치한 좀비: ${kills}마리`;
    gameOverScreen.style.display = 'flex';
}

// 게임 재시작
function restartGame() {
    isGameOver = false;
    player.hp = player.maxHp;
    player.stamina = player.maxStamina;
    player.ammo = 15;
    player.x = 0;
    player.y = 0;
    kills = 0;
    bullets = [];
    zombies = [];
    items = [];
    bloodStains.length = 0;
    gameOverScreen.style.display = 'none';
}

// 초기 아이템 배치
for (let i = 0; i < 5; i++) {
    items.push(new Item((Math.random() - 0.5) * 800, (Math.random() - 0.5) * 800, 'ammo'));
    items.push(new Item((Math.random() - 0.5) * 800, (Math.random() - 0.5) * 800, 'medkit'));
}

// 메인 게임 루프
function animate() {
    requestAnimationFrame(animate);

    // 카메라가 플레이어를 중앙에 맞추도록 부드럽게 추적
    camera.x += (player.x - canvas.width / 2 - camera.x) * 0.1;
    camera.y += (player.y - canvas.height / 2 - camera.y) * 0.1;

    // 화면 지우기 (배경색)
    ctx.fillStyle = '#1e272e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawGrid();

    // 혈흔 렌더링 (바닥 레이어)
    bloodStains.forEach(blood => {
        ctx.fillStyle = `rgba(139, 0, 0, ${blood.alpha})`;
        ctx.beginPath();
        ctx.arc(blood.x - camera.x, blood.y - camera.y, blood.radius, 0, Math.PI * 2);
        ctx.fill();
    });

    if (!isGameOver) {
        player.update();
    }

    // 아이템 업데이트 및 렌더링
    items.forEach((item, index) => {
        item.update(index);
        item.draw();
    });

    // 총알 업데이트 및 렌더링
    bullets.forEach((bullet, index) => {
        bullet.update(index);
        bullet.draw();
    });

    // 좀비 업데이트 및 렌더링
    zombies.forEach((zombie, index) => {
        if (!isGameOver) zombie.update(index);
        zombie.draw();
    });

    // 플레이어 렌더링
    if (!isGameOver) {
        player.draw();
    }

    // 어둠/어스름한 분위기 효과 (비네팅 느낌의 투명 레이어)
    let vignette = ctx.createRadialGradient(
        canvas.width / 2, canvas.height / 2, canvas.width * 0.2,
        canvas.width / 2, canvas.height / 2, canvas.width * 0.7
    );
    vignette.addColorStop(0, 'rgba(0,0,0,0)');
    vignette.addColorStop(1, 'rgba(0,0,0,0.6)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

animate();
</script>
</body>
</html>
